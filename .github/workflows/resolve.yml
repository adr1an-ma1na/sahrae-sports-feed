name: Resolve sports feed

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: resolve
  cancel-in-progress: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install resolver deps
        run: pip install "curl_cffi>=0.7"

      - name: Resolve DaddyLive schedule + streams
        run: python daddy.py

      - name: Show feed summary
        if: always()
        run: |
          grep -oE '"count":[0-9]+|"resolved":[0-9]+|"base":"[^"]*"' feed.json || true
          head -c 400 feed.json || true

      - name: Commit feed
        if: always()
        run: |
          if [ ! -f feed.json ]; then echo "no feed.json"; exit 0; fi
          git config user.name "sahrae-feed-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json
          git commit -m "feed update $(date -u +%FT%TZ)" || { echo "no changes"; exit 0; }
          git push
