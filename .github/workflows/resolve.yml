name: Resolve sports feed

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (fresher tokens)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: resolve
  cancel-in-progress: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (Puppeteer downloads Chromium)
        run: npm install --no-audit --no-fund

      - name: Resolve live streams
        run: node resolve.mjs

      - name: Show feed summary
        if: always()
        run: |
          grep -o '"count":[0-9]*' feed.json || true
          head -c 400 feed.json || true

      - name: Commit feed
        if: always()
        run: |
          if [ ! -f feed.json ]; then echo "no feed.json produced; skipping"; exit 0; fi
          git config user.name "sahrae-feed-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json
          git commit -m "feed update $(date -u +%FT%TZ)" || { echo "no changes"; exit 0; }
          git push
