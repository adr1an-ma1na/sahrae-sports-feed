name: Resolve sports feed

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: resolve
  cancel-in-progress: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish schedule + embed URLs (streamed)
        run: node resolve.mjs

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install curl_cffi
        run: pip install --quiet curl_cffi

      # DaddyLive channels → daddy.json. NON-FATAL: if Cloudflare blocks the CI IP
      # or the resolver fails, it writes an empty daddy.json and the run continues,
      # so the streamed feed.json is never affected.
      - name: Resolve DaddyLive channels
        continue-on-error: true
        run: python daddy.py

      - name: Show feed summary
        if: always()
        run: |
          echo "feed.json:";  grep -oE '"count":[0-9]+|"resolved":[0-9]+' feed.json  || true
          echo "daddy.json:"; grep -oE '"count":[0-9]+|"resolved":[0-9]+' daddy.json || true

      - name: Commit feeds
        if: always()
        run: |
          if [ ! -f feed.json ]; then echo "no feed.json"; exit 0; fi
          git config user.name "sahrae-feed-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A feed.json daddy.json
          git commit -m "feed update $(date -u +%FT%TZ)" || { echo "no changes"; exit 0; }
          git push
